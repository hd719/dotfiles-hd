# Hamel Nord for Ubuntu
palette = 0=#3b4252
palette = 1=#bf616a
palette = 2=#a3be8c
palette = 3=#ebcb8b
palette = 4=#88c0d0
palette = 5=#b48ead
palette = 6=#88c0d0
palette = 7=#e5e9f0
palette = 8=#4c566a
palette = 9=#bf616a
palette = 10=#a3be8c
palette = 11=#ebcb8b
palette = 12=#88c0d0
palette = 13=#b48ead
palette = 14=#add3d2
palette = 15=#d8dee9

background = #3b4252
foreground = #d8dee9
cursor-color = #88c0d0
selection-background = #4c566a
selection-foreground = #d8dee9

background-opacity = 0.82
background-opacity-cells = true
background-blur = 30

font-family = Hasklug Nerd Font
font-style = Regular
font-size = 13.5

window-padding-x = 10
window-padding-y = 5
cursor-style = bar
cursor-style-blink = true
shell-integration-features = no-cursor
mouse-hide-while-typing = true
mouse-scroll-multiplier = 2
copy-on-select = clipboard

keybind = ctrl+shift+r=reload_config
keybind = ctrl+shift+n=new_window
keybind = ctrl+shift+t=new_tab
keybind = ctrl+shift+w=close_surface
